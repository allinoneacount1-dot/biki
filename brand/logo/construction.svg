<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 128" role="img" aria-label="BIKI mark construction grid">
  <title>BIKI — Construction Grid</title>

  <!-- ====== Grid (4x scale of base unit) ====== -->
  <g stroke="currentColor" stroke-opacity="0.06" stroke-width="0.5">
    <!-- Vertical lines, every 4 units -->
    <line x1="0"  y1="0" x2="0"  y2="128"/>
    <line x1="8"  y1="0" x2="8"  y2="128"/>
    <line x1="16" y1="0" x2="16" y2="128"/>
    <line x1="24" y1="0" x2="24" y2="128"/>
    <line x1="32" y1="0" x2="32" y2="128"/>
    <line x1="40" y1="0" x2="40" y2="128"/>
    <line x1="48" y1="0" x2="48" y2="128"/>
    <line x1="56" y1="0" x2="56" y2="128"/>
    <line x1="64" y1="0" x2="64" y2="128"/>
    <line x1="72" y1="0" x2="72" y2="128"/>
    <line x1="80" y1="0" x2="80" y2="128"/>
    <line x1="88" y1="0" x2="88" y2="128"/>
    <line x1="96" y1="0" x2="96" y2="128"/>
    <!-- Horizontal lines, every 4 units -->
    <line x1="0" y1="0"   x2="96" y2="0"/>
    <line x1="0" y1="8"   x2="96" y2="8"/>
    <line x1="0" y1="16"  x2="96" y2="16"/>
    <line x1="0" y1="24"  x2="96" y2="24"/>
    <line x1="0" y1="32"  x2="96" y2="32"/>
    <line x1="0" y1="40"  x2="96" y2="40"/>
    <line x1="0" y1="48"  x2="96" y2="48"/>
    <line x1="0" y1="56"  x2="96" y2="56"/>
    <line x1="0" y1="64"  x2="96" y2="64"/>
    <line x1="0" y1="72"  x2="96" y2="72"/>
    <line x1="0" y1="80"  x2="96" y2="80"/>
    <line x1="0" y1="88"  x2="96" y2="88"/>
    <line x1="0" y1="96"  x2="96" y2="96"/>
    <line x1="0" y1="104" x2="96" y2="104"/>
    <line x1="0" y1="112" x2="96" y2="112"/>
    <line x1="0" y1="120" x2="96" y2="120"/>
    <line x1="0" y1="128" x2="96" y2="128"/>
  </g>

  <!-- ====== Center axis (vertical symmetry) ====== -->
  <line x1="48" y1="0" x2="48" y2="128"
        stroke="currentColor" stroke-opacity="0.25"
        stroke-width="0.5" stroke-dasharray="2,2"/>

  <!-- ====== The Mark (scaled 4x: viewBox 24x32 → 96x128 aligned to grid) ====== -->
  <g fill="currentColor">
    <!-- Upper eye, center 48,32, r=10 -->
    <circle cx="48" cy="32" r="10"/>
    <!-- Lower eye, center 48,72, r=10 -->
    <circle cx="48" cy="72" r="10"/>
    <!-- Threshold line, x=24, y=108, w=48, h=4 -->
    <rect x="24" y="108" width="48" height="4"/>
  </g>

  <!-- ====== Measurement annotations ====== -->
  <g font-family="ui-monospace, 'SF Mono', 'Menlo', monospace"
     font-size="5"
     fill="currentColor"
     fill-opacity="0.55"
     stroke="currentColor"
     stroke-opacity="0.4"
     stroke-width="0.3">

    <!-- r = 2.5u label (right of upper circle) -->
    <line x1="58" y1="32" x2="72" y2="32"/>
    <text x="74" y="34" stroke="none">r = 2.5u</text>

    <!-- vertical gap: 5u between centers -->
    <line x1="58" y1="32" x2="58" y2="72"/>
    <line x1="56" y1="32" x2="60" y2="32"/>
    <line x1="56" y1="72" x2="60" y2="72"/>
    <text x="61" y="55" stroke="none">5u gap</text>

    <!-- threshold width: 12u -->
    <line x1="24" y1="118" x2="72" y2="118"/>
    <line x1="24" y1="116" x2="24" y2="120"/>
    <line x1="72" y1="116" x2="72" y2="120"/>
    <text x="32" y="125" stroke="none">12u wide</text>

    <!-- bottom margin -->
    <text x="2" y="125" stroke="none">base unit = 4px</text>
  </g>
</svg>